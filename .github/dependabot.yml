# .github/dependabot.yml
version: 2
updates:
  # Cấu hình cho Python (backend) - dựa trên requirements.txt
  - package-ecosystem: "pip"
    directory: "/"           # Thư mục chứa requirements.txt
    schedule:
      interval: "weekly"     # Kiểm tra mỗi tuần một lần
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "python-dependencies"
      - "security"
    reviewers:
      - "nguyenhoangduc0707-lang"  # Thay bằng username của bạn

  # Cấu hình cho npm (frontend) - dựa trên frontend/package.json
  - package-ecosystem: "npm"
    directory: "/frontend"   # Thư mục chứa package.json
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "npm-dependencies"
      - "security"
    reviewers:
      - "nguyenhoangduc0707-lang"

  # Cấu hình cho GitHub Actions (nếu có)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"