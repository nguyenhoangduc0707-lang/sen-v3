name: CI/CD for SEN V3
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install deps
      run: |
        pip install -r requirements.txt
        pip install safety
    - name: Security audit
      run: safety check
    - name: Run pipeline test
      run: python test_content_pipeline.py
    - name: Frontend audit
      working-directory: ./frontend
      run: npm ci && npm audit --audit-level=moderate
