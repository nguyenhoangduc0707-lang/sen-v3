# .github/secret_scanning.yml
paths:
  - "**/*.py"
  - "**/*.js"
  - "**/*.json"
  - "**/*.env.example"

patterns:
  - name: "SEN V3 API Key Pattern"
    pattern: |
      (?i)(api[-_]?key|apikey|token|secret)[\s]*[:=][\s]*['"]?([a-zA-Z0-9_\-]{20,})['"]?
    metadata:
      description: "Generic API key pattern for SEN V3"
  
  - name: "Custom JWT Secret"
    pattern: |
      JWT_SECRET_KEY[\s]*=[\s]*['"]([a-zA-Z0-9_\-]{32,})['"]
    metadata:
      description: "JWT secret key for authentication"