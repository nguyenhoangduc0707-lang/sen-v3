version: "3.8"

services:
  # PostgreSQL (recommended for production)
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: dyt01
      POSTGRES_PASSWORD: change_this_strong_password
      POSTGRES_DB: sen_v3
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dyt01"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Main API
  api:
    build: .
    command: python start.py api --no-reload --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://dyt01:change_this_strong_password@db:5432/sen_v3
      - FERNET_KEY=${FERNET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - FACEBOOK_GRAPH_VERSION=v18.0
      # Add other keys as needed (ACCESS_TRADE_*, etc.)
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Facebook Worker (can scale horizontally)
  worker-facebook:
    build: .
    command: python start.py worker --type facebook
    environment:
      - DATABASE_URL=postgresql+asyncpg://dyt01:change_this_strong_password@db:5432/sen_v3
      - FERNET_KEY=${FERNET_KEY}
    depends_on:
      - db
      - api
    restart: unless-stopped

  # Affiliate Worker
  worker-affiliate:
    build: .
    command: python start.py worker --type affiliate
    environment:
      - DATABASE_URL=postgresql+asyncpg://dyt01:change_this_strong_password@db:5432/sen_v3
      - FERNET_KEY=${FERNET_KEY}
      - ACCESS_TRADE_ACCESS_KEY=${ACCESS_TRADE_ACCESS_KEY}
    depends_on:
      - db
      - api
    restart: unless-stopped

  # Scheduler Worker (one instance is enough)
  scheduler:
    build: .
    command: python start.py scheduler
    environment:
      - DATABASE_URL=postgresql+asyncpg://dyt01:change_this_strong_password@db:5432/sen_v3
      - FERNET_KEY=${FERNET_KEY}
    depends_on:
      - db
      - api
    restart: unless-stopped

volumes:
  postgres_data:
