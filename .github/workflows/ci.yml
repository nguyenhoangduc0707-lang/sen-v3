name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements_db.txt
        pip install -r requirements_worker.txt
        pip install pytest pytest-cov black isort flake8

    - name: Check formatting with Black
      run: black --check . --exclude "/(venv|node_modules|\.pytest_cache|alembic/versions)/" --line-length 140

    - name: Check import sorting with isort
      run: isort --check-only . --skip venv --skip node_modules --skip .pytest_cache --profile black --line-length 140

    - name: Lint with flake8
      run: flake8 . --max-line-length=140 --exclude=venv,__pycache__,node_modules,.pytest_cache,alembic/versions

    - name: Run tests with coverage
      run: pytest tests/ --cov=src --cov-report=xml --cov-report=term

    - name: Upload coverage to Codecov (optional)
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
